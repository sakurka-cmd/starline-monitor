version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: starline-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: starline_db
      MYSQL_USER: starline
      MYSQL_PASSWORD: starline123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: starline-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: starline
      MYSQL_PASSWORD: starline123
      MYSQL_DATABASE: starline_db
      JWT_SECRET: change-this-secret-in-production-please
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker (Data Collector)
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: starline-worker
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: starline
      MYSQL_PASSWORD: starline123
      MYSQL_DATABASE: starline_db
      POLL_INTERVAL: 60
    depends_on:
      - mysql
      - backend

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: starline-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://192.168.0.3:8000
    depends_on:
      - backend

volumes:
  mysql_data:
