services:
  mysql:
    image: mysql:8.0
    container_name: starline-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: starline_db
      MYSQL_USER: starline
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-starline123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass123}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: starline-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: starline
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-starline123}
      MYSQL_DATABASE: starline_db
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
    depends_on:
      mysql:
        condition: service_healthy

  worker:
    build: ./worker
    container_name: starline-worker
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: starline
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-starline123}
      MYSQL_DATABASE: starline_db
      POLL_INTERVAL: 60
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
    container_name: starline-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
